name: ci-security

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1) Secret scanning
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2) SAST
      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python

      # 3) Trivy filesystem scan (run CLI directly + upload SARIF)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Trivy filesystem scan (SARIF)
        run: |
          trivy fs \
            --scanners vuln,secret,config \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-fs.sarif \
            . || true

      - name: Upload Trivy FS results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  build-and-scan-image:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        run: |
          docker build -t local/mydevsecops:${{ github.sha }} .

      # Install Trivy again in this job (jobs run on separate runners)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        run: |
          trivy image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            local/mydevsecops:${{ github.sha }}
